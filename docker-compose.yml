services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles: ["production", "dev"]
    ports:
      - "8000:8000"
    volumes:
      - omnivoice_data:/data
      - ./runtime-registry:/app/runtime-registry:ro
      # T13 — the DockerRuntimeDriver talks to the host Docker
      # daemon via the unix socket. Without this mount, the
      # driver can connect (`docker.from_env()`) but every
      # operation fails with "host not accessible". CE-only;
      # Cloud uses a Kubernetes driver (Decision 11).
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/omnivoice.db
      - OMNIVOICE_MODEL=k2-fsa/OmniVoice
      - LOAD_ASR=false
      - HF_HOME=/data/models
      - CORS_ORIGINS=["http://localhost:3000","http://frontend:3000"]
      - DEBUG=false
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=omnivoice
      - MINIO_SECURE=false
      # Runtime subsystem wiring (R3, R6). Runtimes are managed
      # by RuntimeManager → RuntimeDriver; they are never started
      # automatically at platform boot. The user installs and
      # starts runtimes through the Models page.
      - RUNTIME_SERVICE_ENABLED=true
      # Path to the on-disk runtime-registry/ directory.
      - RUNTIME_REGISTRY_PATH=/app/runtime-registry
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  minio:
    image: minio/minio:latest
    profiles: ["production", "dev"]
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    profiles: ["production"]
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  omnivoice_data:
  minio_data:
