services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles: ["production", "dev"]
    ports:
      - "8000:8000"
    volumes:
      - omnivoice_data:/data
      - ./runtime-registry:/app/runtime-registry:ro
      # T13 — the DockerRuntimeDriver talks to the host Docker
      # daemon via the unix socket. Without this mount, the
      # driver can connect (`docker.from_env()`) but every
      # operation fails with "host not accessible". CE-only;
      # Cloud uses a Kubernetes driver (Decision 11).
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/omnivoice.db
      - OMNIVOICE_MODEL=k2-fsa/OmniVoice
      - LOAD_ASR=false
      - HF_HOME=/data/models
      - CORS_ORIGINS=["http://localhost:3000","http://frontend:3000"]
      - DEBUG=false
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=omnivoice
      - MINIO_SECURE=false
      # Phase 3 — runtime subsystem wiring (R3, R6).
      - RUNTIME_SERVICE_ENABLED=true
      # Phase 3 — adapter data-plane config. Set to the runtime
      # service endpoint so KokoroAdapter dispatches to the
      # runtime via HTTPTransport instead of the in-process path.
      - KOKORO_RUNTIME_URL=http://peakvox-kokoro-runtime:8000
      # Path to the on-disk runtime-registry/ directory. The
      # Kokoro descriptor at runtime-registry/kokoro-82m/descriptor.json
      # is loaded at backend startup.
      - RUNTIME_REGISTRY_PATH=/app/runtime-registry
    depends_on:
      minio:
        condition: service_healthy
      peakvox-kokoro-runtime:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Phase 3 — the first concrete Runtime Service (R8 reference).
  # The Kokoro 82M TTS model runs inside this container; the
  # backend orchestrates but never imports kokoro. The container
  # is built from runtime-registry/kokoro-82m/Dockerfile (R8
  # canonical reference shape). The backend reaches it over the
  # compose network on http://peakvox-kokoro-runtime:8000.
  # NO backend code imports kokoro; the runtime container owns
  # the model weights, the framework, and the inference loop (R5).
  peakvox-kokoro-runtime:
    build:
      context: ./runtime-registry/kokoro-82m
      dockerfile: Dockerfile
    image: peakvox/kokoro-runtime:0.1.0
    profiles: ["production", "dev"]
    ports:
      - "8001:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s

  minio:
    image: minio/minio:latest
    profiles: ["production", "dev"]
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    profiles: ["production"]
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  omnivoice_data:
  minio_data:
